# Pre-commit Security Hook Configuration
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: local
    hooks:
      - id: security-scan
        name: Security AI Agent Scan
        entry: python -m security_agent.hooks.pre_commit_hook
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
        description: Runs security scan on staged files before commit

  # Additional security hooks (optional)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: Bandit (Python Security)
        args: ["-r", "src/", "-ll"]

  - repo: https://github.com/returntocorp/semgrep
    rev: v1.50.0
    hooks:
      - id: semgrep
        name: Semgrep Security Scan
        args: ["--config", "auto", "--error"]
