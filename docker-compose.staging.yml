version: '3.8'

services:
  # Flask Application
  api:
    build:
      context: ./ai-agents-service
      dockerfile: Dockerfile.staging
    container_name: pm-simulator-api
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ANTTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    env_file:
      - .env.staging
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pm-simulator-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Celery Worker
  worker:
    build:
      context: ./ai-agents-service
      dockerfile: Dockerfile.staging
    container_name: pm-simulator-worker
    restart: unless-stopped
    command: celery -A tasks worker --loglevel=info --concurrency=2
    environment:
      - FLASK_ENV=production
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    env_file:
      - .env.staging
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - pm-simulator-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Celery Beat (for scheduled tasks)
  beat:
    build:
      context: ./ai-agents-service
      dockerfile: Dockerfile.staging
    container_name: pm-simulator-beat
    restart: unless-stopped
    command: celery -A tasks beat --loglevel=info
    environment:
      - FLASK_ENV=production
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    env_file:
      - .env.staging
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pm-simulator-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Redis with Persistence
  redis:
    image: redis:7-alpine
    container_name: pm-simulator-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - pm-simulator-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Ollama (Local LLM) - Optional
  ollama:
    image: ollama/ollama:latest
    container_name: pm-simulator-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - pm-simulator-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    # Expose port only if needed externally
    # ports:
    #   - "11434:11434"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: pm-simulator-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.staging.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - pm-simulator-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  redis-data:
    driver: local
  ollama-data:
    driver: local

networks:
  pm-simulator-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
