name: Production Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pm_simulator_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          cd ai-agents-service
          pip install -r requirements.txt
          pip install -r requirements-production.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Run Python tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pm_simulator_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd ai-agents-service
          pytest ../tests/ -v --cov=app --cov-report=xml

      - name: Run TypeScript type checking
        run: npx tsc --noEmit || true  # Allow failures for legacy code

      - name: Build frontend
        run: npm run build

  build:
    name: Build Docker Images
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          target: frontend-builder
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pm-simulator-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/pm-simulator-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          target: backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pm-simulator-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/pm-simulator-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/pm-simulator

            # Pull latest changes
            git pull origin main

            # Load environment
            set -a
            source .env.production
            set +a

            # Run deployment
            ./deploy-production.sh

            # Verify deployment
            sleep 30
            curl -f http://localhost/api/health || exit 1

            echo "Deployment successful!"

  notify:
    name: Notify on Failure
    needs: [test, build, deploy]
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Send notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: 'PM Simulator deployment failed!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
